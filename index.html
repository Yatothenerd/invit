<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Invitation</title>

    <!-- Social sharing / thumbnail -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://invit-rho.vercel.app" />
    <meta property="og:title" content="Wedding Invitation" />
    <meta property="og:site_name" content="Wedding Invitation" />
    <meta property="og:description" content="You are warmly invited to our wedding." />
    <!-- Use absolute URL so Facebook/Messenger/Telegram accept it -->
    <!-- New filename to force Telegram to fetch fresh thumbnail -->
    <meta property="og:image" content="https://invit-rho.vercel.app/image/Asset/ThumbnailNew.png" />
    <meta property="og:image:secure_url" content="https://invit-rho.vercel.app/image/Asset/ThumbnailNew.png" />
    <meta property="og:image:type" content="image/png" />
    <!-- Adjust width/height if your Thumbnail.png has different dimensions -->
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Wedding Invitation" />
    <meta name="twitter:description" content="You are warmly invited to our wedding." />
    <meta name="twitter:image" content="https://invit-rho.vercel.app/image/Asset/ThumbnailNew.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
